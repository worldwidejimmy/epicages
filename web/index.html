<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Epic Ages</title>
    <style>
      html, body, #root { height: 100%; margin: 0; padding: 0; }
      body { 
        background: #0b0f1a; 
        color: #e6e9ef; 
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif; 
      }
      
      .app {
        height: 100%;
        display: flex;
      }
      
      .sidebar {
        width: 320px;
        height: 100%;
        overflow-y: auto;
        background: rgba(11,15,26,0.95);
        border-right: 1px solid #2e3548;
        padding: 16px;
        z-index: 5;
      }
      
      .game-area {
        flex: 1;
        position: relative;
        height: 100%;
      }
      
      .game-header h1 {
        margin: 0 0 8px 0;
        font-size: 24px;
        color: #f9d65c;
      }
      
      .era-badge {
        margin-bottom: 16px;
        padding: 8px;
        background: rgba(249, 214, 92, 0.1);
        border: 1px solid #f9d65c;
        border-radius: 6px;
      }
      
      .era-badge h2 {
        margin: 0 0 4px 0;
        font-size: 16px;
        color: #f9d65c;
      }
      
      .era-badge small {
        color: #b8bcc8;
      }
      
      .resources {
        margin-bottom: 16px;
      }
      
      .resources h3 {
        margin: 0 0 8px 0;
        font-size: 14px;
        color: #e6e9ef;
      }
      
      .resource-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      
      .resource-item {
        padding: 8px;
        background: rgba(27, 36, 57, 0.6);
        border: 1px solid #2e3548;
        border-radius: 4px;
      }
      
      .resource-item strong {
        color: #f9d65c;
      }
      
      .resource-item small {
        display: block;
        color: #8b95a7;
        font-size: 10px;
        margin-top: 2px;
      }
      
      .actions {
        margin-bottom: 16px;
      }
      
      .actions h3 {
        margin: 0 0 8px 0;
        font-size: 14px;
        color: #e6e9ef;
      }
      
      .buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      
      .btn { 
        background: #1b2439; 
        color: #e6e9ef; 
        border: 1px solid #5b6374; 
        border-radius: 6px; 
        padding: 8px 10px; 
        cursor: pointer;
        font-size: 12px;
        text-align: center;
      }
      
      .btn:hover { 
        background: #263150; 
      }
      
      .command-section {
        margin-bottom: 16px;
      }
      
      .command-section label {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        color: #b8bcc8;
      }
      
      .command-section input {
        width: 100%;
        padding: 8px;
        background: #1b2439;
        border: 1px solid #5b6374;
        border-radius: 4px;
        color: #e6e9ef;
        font-size: 12px;
        margin-bottom: 8px;
        box-sizing: border-box;
      }
      
      .tech-section, .structures-section, .neighbors-section {
        margin-bottom: 16px;
      }
      
      .tech-section h3, .structures-section h3, .neighbors-section h3 {
        margin: 0 0 8px 0;
        font-size: 14px;
        color: #e6e9ef;
      }
      
      .tech-list, .structure-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      
      .tech-item, .structure-item {
        padding: 4px 8px;
        background: rgba(27, 36, 57, 0.4);
        border: 1px solid #2e3548;
        border-radius: 4px;
        margin-bottom: 4px;
        font-size: 12px;
      }
      
      .neighbor {
        padding: 8px;
        background: rgba(27, 36, 57, 0.4);
        border: 1px solid #2e3548;
        border-radius: 4px;
        margin-bottom: 8px;
      }
      
      .neighbor strong {
        color: #f9d65c;
      }
      
      .neighbor-info {
        font-size: 11px;
        color: #8b95a7;
        margin-top: 4px;
      }
      
      .controls {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid #2e3548;
      }
      
      .controls label {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        color: #b8bcc8;
      }
      
      .controls input[type="range"] {
        width: 100%;
        margin-bottom: 4px;
      }
      
      .controls span {
        font-size: 11px;
        color: #8b95a7;
      }
      
      .diagnostics-section {
        margin-bottom: 16px;
        padding: 12px;
        background: rgba(27, 36, 57, 0.4);
        border: 1px solid #2e3548;
        border-radius: 6px;
      }
      
      .diagnostics-section h3 {
        margin: 0 0 12px 0;
        font-size: 14px;
        color: #f9d65c;
      }
      
      .diag-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 12px;
      }
      
      .diag-grid > div {
        padding: 6px;
        background: rgba(11, 15, 26, 0.6);
        border-radius: 4px;
      }
      
      .diag-grid p {
        margin: 0 0 4px 0;
        font-size: 10px;
        color: #8b95a7;
        text-transform: uppercase;
      }
      
      .diag-grid strong {
        font-size: 12px;
        color: #e6e9ef;
      }
      
      .last-event {
        margin-bottom: 12px;
        padding: 8px;
        background: rgba(11, 15, 26, 0.6);
        border-radius: 4px;
      }
      
      .last-event p {
        margin: 0 0 4px 0;
        font-size: 10px;
        color: #8b95a7;
        text-transform: uppercase;
      }
      
      .last-event strong {
        font-size: 11px;
        color: #e6e9ef;
        word-break: break-word;
      }
      
      .recent-events h4 {
        margin: 0 0 8px 0;
        font-size: 12px;
        color: #b8bcc8;
      }
      
      .recent-events ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      
      .recent-events li {
        padding: 6px;
        background: rgba(11, 15, 26, 0.6);
        border-radius: 4px;
        margin-bottom: 4px;
        font-size: 11px;
        color: #e6e9ef;
      }
      
      .recent-events li span {
        color: #f9d65c;
        font-weight: bold;
      }
      
      .recent-events p {
        margin: 0;
        font-size: 11px;
        color: #8b95a7;
        font-style: italic;
      }
      
      /* mobile tweaks */
      @media (max-width: 900px) {
        .app {
          flex-direction: column;
        }
        
        .sidebar {
          width: 100%;
          height: 200px;
          order: 2;
        }
        
        .game-area {
          height: calc(100% - 200px);
          order: 1;
        }
        
        .buttons {
          grid-template-columns: 1fr;
        }
        
        .btn { 
          padding: 12px 16px; 
          font-size: 14px; 
        }
      }

      /* Splash Screen Styles */
      .splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0b0f1a 0%, #1a1f2e 50%, #0b0f1a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
        transition: opacity 0.5s ease-out;
      }

      .splash-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .splash-content {
        text-align: center;
        color: #e6e9ef;
      }

      .splash-logo {
        margin-bottom: 32px;
      }

      .splash-title {
        font-size: 48px;
        font-weight: bold;
        margin: 0 0 8px 0;
        background: linear-gradient(135deg, #f9d65c 0%, #ffd700 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: 0 0 20px rgba(249, 214, 92, 0.5);
        animation: glow 2s ease-in-out infinite alternate;
      }

      @keyframes glow {
        from {
          filter: drop-shadow(0 0 10px rgba(249, 214, 92, 0.5));
        }
        to {
          filter: drop-shadow(0 0 20px rgba(249, 214, 92, 0.8));
        }
      }

      .splash-subtitle {
        font-size: 18px;
        color: #b8bcc8;
        margin-top: 8px;
      }

      .splash-info {
        margin-bottom: 32px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }

      .splash-version,
      .splash-build,
      .splash-time {
        display: flex;
        gap: 8px;
        font-size: 14px;
      }

      .info-label {
        color: #8b95a7;
      }

      .info-value {
        color: #f9d65c;
        font-weight: 500;
      }

      .splash-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(249, 214, 92, 0.2);
        border-top-color: #f9d65c;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        color: #b8bcc8;
        font-size: 14px;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
    </style>
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="shortcut icon" type="image/png" href="/assets/favicon.png" />
    <meta name="epic-ages-version" content="BUILD_VERSION_PLACEHOLDER" />
    <script>
      // Version info injected at build time
      window.EPIC_AGES_VERSION = "BUILD_VERSION_PLACEHOLDER";
      window.EPIC_AGES_BUILD_TIME = "BUILD_TIME_PLACEHOLDER";
      console.log("[Epic Ages] Client version:", window.EPIC_AGES_VERSION);
      console.log("[Epic Ages] Build time:", window.EPIC_AGES_BUILD_TIME);
      console.log("[Epic Ages] Build date:", new Date(window.EPIC_AGES_BUILD_TIME).toLocaleString());
      console.log("[TEST] Inline script executing - JavaScript is working!");
      // Remove splash immediately after DOMContentLoaded so we can see app or errors
      document.addEventListener("DOMContentLoaded", () => {
        console.log("[TEST] DOMContentLoaded fired");
        setTimeout(() => {
          const s = document.getElementById("splash");
          if (s) s.remove();
        }, 100);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
